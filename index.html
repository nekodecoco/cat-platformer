<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Platformer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #2b2340;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
    }
    /* Phaser's FIT scale mode sizes the canvas to this container,
       keeping the 16:9 aspect ratio and centering automatically */
    #game-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 3 game framework, loaded from CDN (needs internet on first load) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <!-- Kenney sprites embedded as data URIs (works from file:// too) -->
  <script src="assets.js"></script>
  <!-- Our game code -->
  <script src="game.js"></script>
</body>
</html>
